{% extends "base.html" %}
{% block title %}{{ quiz.title }}{% endblock %}
{% block body %}
<div class="portal">
  <aside class="sidebar" id="sidebar">
    <button class="collapse-btn" id="collapseBtn" title="Collapse">☰</button>
    <div class="sidebar-content">
      <h2 class="brand">🎓 Math Tutoring</h2>
      <p class="who">{{ user.name or user.email }}</p>
      {% include "_portal_nav.html" %}
      <a class="btn logout-btn" href="{{ url_for('logout') }}">Sign out</a>
    </div>
  </aside>
  <main class="content">
    <a href="{{ url_for('quizzes') }}" class="back-link">&larr; Back to quizzes</a>
    <h1>{{ quiz.title }}</h1>
    <section id="quizContainer"></section>
  </main>
</div>
{% endblock %}
{% block scripts %}
<script>
  const questions = {{ questions | tojson }};
  renderQuizQuestions(questions, document.getElementById("quizContainer"));
</script>
{% endblock %}
